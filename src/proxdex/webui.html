<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>proxdex</title>
<style>
  :root {
    --bg:#0e1014; --panel:#171a21; --panel2:#1f2530; --line:#2b303b; --fg:#e7e9ef;
    --dim:#95a0b2; --accent:#6ea8fe; --ok:#57d38c; --warn:#f0b24b; --bad:#f2678a;
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  a{color:var(--accent);text-decoration:none}
  button,input,select{background:var(--panel2);color:var(--fg);border:1px solid var(--line);
    border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit}
  button{cursor:pointer} button:hover{border-color:var(--accent)} button:disabled{opacity:.45;cursor:default}
  button.primary{background:var(--accent);color:#0a0c10;border-color:var(--accent);font-weight:600}
  button.ghost{background:transparent}
  button.bad{border-color:var(--bad);color:var(--bad)}
  label{font-size:12px;color:var(--dim)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);
    padding:10px 16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;letter-spacing:.5px}
  .lib{color:var(--dim);font-size:11px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  nav button{background:transparent;border-color:transparent;color:var(--dim)}
  nav button.active{color:var(--fg);border-color:var(--line);background:var(--panel2)}
  .spacer{flex:1}
  main{padding:16px;max-width:1500px;margin:0 auto}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin:24px 0 10px}
  .grid{display:grid;gap:13px;grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;
    cursor:pointer;transition:transform .08s,border-color .08s}
  .card:hover{transform:translateY(-2px);border-color:var(--accent)}
  .thumb{width:100%;aspect-ratio:63/88;object-fit:cover;background:var(--panel2);display:block}
  .meta{padding:7px 9px}
  .meta .id{font-size:10px;color:var(--dim)} .meta .nm{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badges{display:flex;gap:3px;margin-top:5px;align-items:center}
  .b{width:17px;height:17px;border-radius:5px;font-size:10px;font-weight:700;display:grid;place-items:center;background:var(--line);color:var(--dim)}
  .b.on{background:var(--ok);color:#0a0c10}
  .pin{margin-left:auto;font-size:11px} .pin.p{color:var(--ok)} .pin.q{color:var(--warn)}
  /* card detail */
  .detail{display:grid;grid-template-columns:150px 1fr 300px;gap:20px;align-items:start}
  @media(max-width:900px){.detail{grid-template-columns:1fr}.stagelist{flex-direction:row!important;flex-wrap:wrap}}
  .stagelist{display:flex;flex-direction:column;gap:6px;position:sticky;top:72px}
  .stagelist .cap{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:2px}
  .stagelist button{display:flex;gap:9px;align-items:center;width:100%;text-align:left;padding:9px 11px}
  .stagelist button.active{background:var(--accent);color:#0a0c10;border-color:var(--accent);font-weight:600}
  .stagelist button:disabled{opacity:.32}
  .stagelist .n{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:11px;
    font-weight:700;background:var(--line);color:var(--dim);flex:0 0 auto}
  .stagelist button.active .n{background:rgba(0,0,0,.25);color:#0a0c10}
  .viewer{position:relative;height:calc(100vh - 150px);aspect-ratio:63/88;margin:0 auto;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .stageimg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    opacity:0;transition:opacity .1s;cursor:zoom-in}
  .stageimg.show{opacity:1}
  .viewer .ph{position:absolute;inset:0;display:grid;place-items:center;color:var(--dim);
    font-size:13px;text-align:center;padding:20px}
  .warn{background:rgba(240,178,75,.13);border:1px solid var(--warn);color:var(--warn);
    border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:13px}
  .warn button{margin:0 6px}
  .side{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;height:fit-content}
  .side h3{margin:0 0 2px} .side .sub{color:var(--dim);font-size:12px;margin-bottom:14px}
  .act{border-top:1px solid var(--line);padding:12px 0;display:flex;flex-direction:column;gap:8px}
  .act:first-of-type{border-top:none}
  .act .t{font-weight:600;font-size:13px}
  .nav-cards{display:flex;gap:8px;align-items:center;margin-bottom:14px}
  fieldset{border:1px solid var(--line);border-radius:10px;margin:0 0 14px;padding:12px 14px}
  legend{color:var(--accent);font-size:12px;font-weight:600;padding:0 6px}
  .field{display:grid;grid-template-columns:180px 1fr;gap:10px;align-items:center;margin:6px 0}
  .field input,.field select{width:100%}
  .res{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .rcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;position:relative}
  .rcard.have{outline:2px solid var(--ok)}
  .rcard img{width:100%;aspect-ratio:63/88;object-fit:cover;background:var(--panel2)}
  .rcard .rm{padding:7px 9px;font-size:11px} .rcard .rm b{font-size:12px}
  .rcard input[type=checkbox]{position:absolute;top:6px;left:6px;width:18px;height:18px}
  .batch{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;display:flex;gap:10px;align-items:center;margin-bottom:6px}
  .tag{font-size:11px;color:var(--dim)}
  #toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;padding:10px 16px;max-width:80vw;white-space:pre-wrap;
    font-size:12px;display:none;z-index:40;box-shadow:0 10px 34px rgba(0,0,0,.5)}
  #busy{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:35;place-items:center;color:var(--fg)}
  #busy.on{display:grid}
  #lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;z-index:50;place-items:center;padding:30px}
  #lightbox img{max-width:100%;max-height:100%;border-radius:8px}
  dialog{background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:440px}
  dialog::backdrop{background:rgba(0,0,0,.6)}
</style>
</head>
<body>
<header>
  <h1>proxdex</h1><span class="lib" id="lib"></span>
  <nav class="row">
    <button data-view="library" class="active">Library</button>
    <button data-view="search">Search</button>
    <button data-view="settings">Settings</button>
  </nav>
  <div class="spacer"></div>
  <div class="row">
    <button class="primary" onclick="act('/api/step',{cmd:'build'},'built all')">⚙ Build all</button>
    <button onclick="sheetDialog()">🖨 Sheet</button>
    <button title="Regenerate INDEX.md" onclick="act('/api/index',{},'index updated')">↺ index</button>
    <button onclick="refresh()">⟳</button>
  </div>
</header>
<main id="main"></main>

<div id="busy"><div>working…</div></div>
<div id="toast"></div>
<div id="lightbox" onclick="this.style.display='none'"><img id="lbimg" /></div>

<dialog id="sheetdlg">
  <h3 style="margin-top:0">Make print sheet</h3>
  <div class="field"><label>batch name</label><input id="sd_name" value="deck" /></div>
  <div class="field"><label>faces</label><select id="sd_faces"></select></div>
  <div class="field"><label>page</label><select id="sd_page"></select></div>
  <div class="field"><label>dpi</label><input id="sd_dpi" type="number" placeholder="config default" /></div>
  <div class="field"><label>profile</label><select id="sd_profile"></select></div>
  <div class="row" style="justify-content:flex-end;margin-top:14px">
    <button onclick="sheetdlg.close()">cancel</button>
    <button class="primary" onclick="makeSheet()">Make sheet</button>
  </div>
</dialog>

<script>
const $ = s => document.querySelector(s);
const state = { view:'library', cards:[], meta:null, idx:-1, stage:null, ver:{}, cfg:null };

function toast(msg, ms=4500){ const t=$('#toast'); t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); if(ms) t._t=setTimeout(()=>t.style.display='none',ms); }
async function get(p){ const r=await fetch(p); if(!r.ok) throw await r.text(); return r.json(); }
async function act(path, body, okmsg){
  $('#busy').classList.add('on');
  try{
    const r=await fetch(path,{method:body&&body._method||'POST',headers:{'Content-Type':'application/json'},
      body: body&&body._method?undefined:JSON.stringify(body||{})});
    const j=await r.json();
    toast(j.ok!==false ? (okmsg+'\n'+tail(j.log)) : ('failed:\n'+(j.log||'')), j.ok!==false?4500:14000);
  }catch(e){ toast('error: '+e,14000); }
  $('#busy').classList.remove('on');
  await refresh(true);
}
const tail = s => (s||'').trim().split('\n').slice(-4).join('\n');
function bump(id){ state.ver[id]=(state.ver[id]||0)+1; }
const imgsrc = (id,stage) => `/api/image/${id}/${stage}?v=${state.ver[id]||0}`;

async function refresh(keepDetail){
  [state.cards, state.meta] = await Promise.all([get('/api/cards'), state.meta?Promise.resolve(state.meta):get('/api/meta')]);
  if(state.view==='library') render();
  else if(state.view==='card' && keepDetail){ bumpAll(); renderCard(); }
  else render();
}
function bumpAll(){ if(state.idx>=0){ const c=state.cards[state.idx]; if(c) bump(c.id); } }

/* ---------- views ---------- */
function render(){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===state.view));
  const m=$('#main');
  if(state.view==='library') m.innerHTML=viewLibrary();
  else if(state.view==='card') { m.innerHTML=''; renderCard(); }
  else if(state.view==='search') m.innerHTML=viewSearch();
  else if(state.view==='settings'){ m.innerHTML='<div class="tag">loading…</div>'; renderSettings(); }
}
function viewLibrary(){
  const cards = state.cards.map((c,i)=>{
    const s=c.stages;
    const pin=c.printed?'<span class="pin p">✓</span>':(c.batch?`<span class="pin q">•</span>`:'');
    return `<div class="card" onclick="openCard(${i})">
      <img class="thumb" loading="lazy" src="/api/thumb/${c.id}?v=${state.ver[c.id]||0}" onerror="this.style.opacity=.12">
      <div class="meta"><div class="id">${c.id}</div><div class="nm">${c.name}</div>
      <div class="badges">${badge(s.original,'O')}${badge(s.bordered,'B')}${badge(s.upscaled,'U')}${badge(s.edited,'E')}${pin}</div>
      </div></div>`;
  }).join('') || '<div class="tag">No cards yet — go to Search to add some.</div>';
  return `<div class="grid">${cards}</div><h2>Print batches</h2><div id="batches"></div>`
    .replace('<div id="batches"></div>','<div id="batches"></div>') + '';
}
const badge=(on,l)=>`<div class="b ${on?'on':''}">${l}</div>`;

async function loadBatches(){
  const b=await get('/api/batches'); const el=$('#batches'); if(!el) return;
  el.innerHTML = b.length? b.map(x=>`<div class="batch"><b>${x.name}</b>
    <span class="tag">${x.cards} cards · ${x.faces||''} · ${x.printed?'printed':'queued'}</span><div class="spacer"></div>
    ${x.pdfs.map(f=>`<a href="/api/pdf/${x.dir}/${f}" target="_blank">${f}</a>`).join(' · ')}
    ${x.printed?'':`<button onclick="act('/api/printed/${encodeURIComponent(x.name)}',{},'marked printed')">mark printed</button>`}
    </div>`).join('') : '<div class="tag">none yet</div>';
}

/* ---------- card detail (flip through) ---------- */
function present(c){ return state.meta.stages.filter(k=>c.stages[k]); }
function openCard(i){ state.idx=i; state.stage=null; state.view='card';
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active')); render(); }
function step(d){ state.idx=(state.idx+d+state.cards.length)%state.cards.length; state.stage=null; renderCard(); }
function showStage(k){ state.stage=k;  // toggle visibility only — no re-render, no reload
  document.querySelectorAll('.stageimg').forEach(el=>el.classList.toggle('show',el.dataset.k===k));
  document.querySelectorAll('.stagelist button[data-k]').forEach(b=>b.classList.toggle('active',b.dataset.k===k)); }
function setStage(k){ const c=state.cards[state.idx]; if(c.stages[k]) showStage(k); }
function cycleStage(d){ const p=present(state.cards[state.idx]); if(!p.length)return;
  let i=p.indexOf(state.stage); i=(i+d+p.length)%p.length; showStage(p[i]); }
const viewsrc=(id,k)=>`/api/view/${id}/${k}?v=${state.ver[id]||0}`;
function renderCard(){
  const c=state.cards[state.idx]; if(!c){ state.view='library'; return render(); }
  const stg = state.meta.stages, p = present(c);
  if(!state.stage || !c.stages[state.stage]) state.stage = p.length ? p[p.length-1] : null;
  const list = stg.map((k,i)=>`<button data-k="${k}" class="${k===state.stage?'active':''}" ${c.stages[k]?'':'disabled'} onclick="setStage('${k}')"><span class="n">${i+1}</span>${k}</button>`).join('');
  const imgs = p.map(k=>`<img class="stageimg ${k===state.stage?'show':''}" data-k="${k}" src="${viewsrc(c.id,k)}" onclick="lightbox('${imgsrc(c.id,k)}')">`).join('');
  const viewer = `<div class="viewer">${imgs || '<div class="ph">no images yet — run a step →</div>'}</div>`;
  const models = state.meta.models.map(m=>`<option>${m}</option>`).join('');
  $('#main').innerHTML = `
    <div class="nav-cards">
      <button onclick="state.view='library';render()">← Library</button>
      <button onclick="step(-1)">‹ Prev</button><button onclick="step(1)">Next ›</button>
      <b>${c.name}</b><span class="tag">${c.id} · ${state.idx+1}/${state.cards.length}
        · ←/→ cards · ↑/↓ stages</span>
    </div>
    <div id="fmtwarn"></div>
    <div class="detail">
      <div class="stagelist"><div class="cap">stages</div>${list}</div>
      <div>${viewer}</div>
      <div class="side">
        <h3>${c.name}</h3><div class="sub">${c.id} · ${c.set}</div>
        <div class="act"><div class="t">Border (frame fix)</div>
          <button onclick="runStep('border',{},true)">Run border (force)</button></div>
        <div class="act"><div class="t">Upscale</div>
          <div class="field"><label>model</label><select id="u_model">${models}</select></div>
          <div class="field"><label>scale</label><select id="u_scale"><option>1</option><option selected>2</option><option>3</option><option>4</option></select></div>
          <div class="field"><label>double</label><input type="checkbox" id="u_double" checked></div>
          <button onclick="runStep('upscale',{model:$('#u_model').value,scale:+$('#u_scale').value,double:$('#u_double').checked},true)">Run upscale</button></div>
        <div class="act"><div class="t">Grade</div>
          <div class="field"><label>normalize</label><input type="checkbox" id="g_norm" checked></div>
          <button onclick="runStep('grade',{normalize:$('#g_norm').checked},true)">Run grade</button></div>
        <div class="act"><div class="t">Whole pipeline</div>
          <button class="primary" onclick="runStep('build',{},true)">Build (border→upscale→grade)</button></div>
        <div class="act"><div class="t">Inspect</div>
          <button onclick="measure()">Measure frame</button><div id="mout" class="tag"></div></div>
        <div class="act"><button class="bad" onclick="delCard()">Delete card</button></div>
      </div>
    </div>`;
  const m=$('#u_model'); if(m) m.value = state.meta.models.includes('digital-art-4x')?'digital-art-4x':m.value;
  checkFormat(c.id);
}
async function checkFormat(id){
  const el=$('#fmtwarn'); if(!el) return;
  try{ const r=await get('/api/measure/'+id);
    if(r.error||r.format_ok){ el.innerHTML=''; return; }
    const pl=r.plan;
    el.innerHTML=`<div class="warn">⚠ format off (aspect ${r.aspect>0?'too wide':'too tall'}, Δ${r.aspect}).
      <code>border</code> would pad +top${pl.top} +bottom${pl.bottom} +left${pl.left} +right${pl.right}px.
      <button onclick="runStep('build',{},true)">Rebuild to fix</button>
      <span class="tag">tune fill in Settings → [border] aspect_bias_x/y</span></div>`;
  }catch(e){ el.innerHTML=''; }
}
async function runStep(cmd, opts, force){
  const c=state.cards[state.idx];
  const produced={border:'bordered',upscale:'upscaled',grade:'edited',build:'edited'}[cmd];
  await act('/api/step',{cmd, ids:[c.id], opts, force},`${cmd} · ${c.id}`);
  const nc=state.cards[state.idx];
  if(nc && nc.stages[produced]){ state.stage=produced; renderCard(); }  // show the result
}
async function measure(){
  const c=state.cards[state.idx];
  try{ const r=await get('/api/measure/'+c.id);
    $('#mout').textContent = r.error?r.error:`top ${r.top} · left ${r.left} · right ${r.right} · side ${r.side_pct}% → ${r.verdict}`;
  }catch(e){ $('#mout').textContent='error'; }
}
async function delCard(){ const c=state.cards[state.idx];
  if(!confirm('Delete '+c.id+' and all its files?')) return;
  await act('/api/card/'+c.id,{_method:'DELETE'},'deleted'); state.view='library'; render(); }
function lightbox(src){ $('#lbimg').src=src; $('#lightbox').style.display='grid'; }

/* ---------- search ---------- */
function viewSearch(){
  return `<div class="row" style="margin-bottom:6px">
    <input id="q" placeholder="card name, e.g. entei ex" size="24" onkeydown="if(event.key==='Enter')doSearch()">
    <input id="f_set" placeholder="set (ex4)" size="8"><input id="f_rar" placeholder="rarity" size="8">
    <input id="f_year" placeholder="year" size="6">
    <button class="primary" onclick="doSearch()">Search</button>
    <div class="spacer"></div><button onclick="fetchSel()">⬇ Fetch selected</button></div>
    <div id="results" class="res"></div>`;
}
async function doSearch(){
  const p=new URLSearchParams({q:$('#q').value});
  if($('#f_set').value)p.set('set',$('#f_set').value);
  if($('#f_rar').value)p.set('rarity',$('#f_rar').value);
  if($('#f_year').value)p.set('year',$('#f_year').value);
  $('#results').innerHTML='<div class="tag">searching…</div>';
  try{ const r=await get('/api/search?'+p);
    if(!Array.isArray(r)){ $('#results').innerHTML='<div class="tag">'+(r.error||'no results')+'</div>'; return; }
    $('#results').innerHTML = r.length? r.map(x=>`<label class="rcard ${x.have?'have':''}">
      <input type="checkbox" value="${x.id}" ${x.have?'disabled':''}>
      <img loading="lazy" src="${x.image}" onerror="this.style.opacity=.12">
      <div class="rm"><b>${x.name}</b><br>${x.set} · ${x.year} · ${x.number}<br>
      <span class="tag">${x.rarity} · ${x.artist}${x.have?' · have':''}</span></div></label>`).join('')
      : '<div class="tag">no matches</div>';
  }catch(e){ $('#results').innerHTML='<div class="tag">error: '+e+'</div>'; }
}
async function fetchSel(){
  const ids=[...document.querySelectorAll('#results input:checked')].map(c=>c.value);
  if(!ids.length){ toast('select some cards first'); return; }
  await act('/api/fetch',{ids},`fetched ${ids.length}`);
}

/* ---------- settings ---------- */
async function renderSettings(){
  state.cfg = await get('/api/config');
  const secs = Object.entries(state.cfg.sections).map(([name,kv])=>`<fieldset><legend>${name}</legend>
    ${Object.entries(kv).map(([k,v])=>fieldFor(name,k,v)).join('')}</fieldset>`).join('');
  $('#main').innerHTML = `<div class="row"><h2 style="margin:0">Config — proxdex.toml</h2>
    <div class="spacer"></div><button class="primary" onclick="saveConfig()">Save config</button></div>
    ${secs}
    <h2>Card back</h2>
    <div class="row"><select id="bk_tcg"><option value="">— tcg —</option><option>mtg</option></select>
      <input id="bk_url" placeholder="or image URL" size="30">
      <button onclick="setBack()">Set back</button>
      <label>upload <input type="file" id="bk_file" accept="image/*" onchange="uploadBack(this)"></label></div>
    <h2>Calibration</h2><div id="calwrap" class="tag">loading…</div>`;
  loadCal();
}
function fieldFor(sec,key,val){
  const id=`cfg_${sec}_${key}`; let input;
  if(typeof val==='boolean') input=`<input type="checkbox" id="${id}" ${val?'checked':''}>`;
  else if(typeof val==='number') input=`<input type="number" step="any" id="${id}" value="${val}">`;
  else if(Array.isArray(val)) input=`<input id="${id}" value="${val.join(', ')}" placeholder="comma list">`;
  else input=`<input id="${id}" value="${String(val).replace(/"/g,'&quot;')}">`;
  return `<div class="field"><label>${key}</label>${input}</div>`;
}
async function saveConfig(){
  const sections={};
  for(const [name,kv] of Object.entries(state.cfg.sections)){
    sections[name]={};
    for(const [k,v] of Object.entries(kv)){
      const el=$(`#cfg_${name}_${k}`);
      if(typeof v==='boolean') sections[name][k]=el.checked;
      else if(typeof v==='number') sections[name][k]=parseFloat(el.value);
      else if(Array.isArray(v)) sections[name][k]=el.value.trim()?el.value.split(',').map(s=>{const n=+s.trim();return isNaN(n)?s.trim():n;}):[];
      else sections[name][k]=el.value;
    }
  }
  await act('/api/config',{sections},'config saved');
}
async function setBack(){
  const tcg=$('#bk_tcg').value, url=$('#bk_url').value;
  await act('/api/back', tcg?{tcg}:{url}, 'card back set');
}
async function uploadBack(inp){
  if(!inp.files[0]) return; const fd=new FormData(); fd.append('file',inp.files[0]);
  $('#busy').classList.add('on');
  const r=await fetch('/api/back/upload',{method:'POST',body:fd}); const j=await r.json();
  $('#busy').classList.remove('on'); toast(j.ok?'card back set':'failed:\n'+j.log);
}
async function loadCal(){
  const cals=await get('/api/calibrate');
  const profs=state.meta.profiles;
  $('#calwrap').innerHTML = `<div class="row" style="margin-bottom:8px">
    <select id="cal_prof">${profs.map(p=>`<option>${p}</option>`).join('')}</select>
    <a id="cal_dl" href="#" onclick="dlChart(false)">download chart</a> ·
    <a href="#" onclick="dlChart(true)">corrected chart</a>
    <label>fit scan <input type="file" id="cal_scan" accept="image/*" onchange="calFit(this,false)"></label>
    <label>check scan <input type="file" id="cal_scan2" accept="image/*" onchange="calFit(this,true)"></label></div>
    ${cals.length?cals.map(c=>`<div class="tag">• ${c.profile}: raw err ${(c.error.mean||0).toFixed?c.error.mean.toFixed(1):c.error.mean} / ${c.error.max?.toFixed?.(1)??''}</div>`).join(''):'<div class="tag">no calibrations yet</div>'}`;
}
function dlChart(corr){ const p=$('#cal_prof').value; window.open(`/api/calibrate/chart?profile=${encodeURIComponent(p)}&corrected=${corr}`,'_blank'); return false; }
async function calFit(inp,check){
  if(!inp.files[0])return; const fd=new FormData(); fd.append('file',inp.files[0]);
  fd.append('profile',$('#cal_prof').value); fd.append('check',check);
  $('#busy').classList.add('on'); const r=await fetch('/api/calibrate/fit',{method:'POST',body:fd}); const j=await r.json();
  $('#busy').classList.remove('on'); toast(j.ok?tail(j.log):'failed:\n'+j.log, 9000); loadCal();
}

/* ---------- sheet dialog ---------- */
function sheetDialog(){
  const opt=(arr,sel)=>arr.map(x=>`<option ${x===sel?'selected':''}>${x}</option>`).join('');
  $('#sd_faces').innerHTML=opt(state.meta.faces); $('#sd_page').innerHTML=opt(state.meta.pages);
  $('#sd_profile').innerHTML='<option value="">config default</option>'+opt(state.meta.profiles);
  sheetdlg.showModal();
}
async function makeSheet(){
  sheetdlg.close();
  await act('/api/sheet',{name:$('#sd_name').value||'deck',faces:$('#sd_faces').value,
    page:$('#sd_page').value,dpi:$('#sd_dpi').value?+$('#sd_dpi').value:null,
    profile:$('#sd_profile').value||null},'sheet written');
}

/* ---------- boot ---------- */
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;render();});
document.addEventListener('keydown',e=>{ if(state.view!=='card')return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowRight')step(1); else if(e.key==='ArrowLeft')step(-1);
  else if(e.key==='ArrowUp'){e.preventDefault();cycleStage(-1);} else if(e.key==='ArrowDown'){e.preventDefault();cycleStage(1);}
  else if(e.key==='Escape'){state.view='library';render();}});
const _origRender=render; render=function(){ _origRender(); if(state.view==='library') loadBatches(); };
get('/api/config').then(c=>$('#lib').textContent=c.root);
refresh();
</script>
</body>
</html>
