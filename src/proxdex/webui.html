<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>proxdex</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --panel2: #20242e; --line: #2b303b;
    --fg: #e6e8ee; --dim: #9aa3b2; --accent: #6ea8fe; --ok: #57d38c;
    --warn: #f0b24b; --pill: #2b303b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { position: sticky; top: 0; z-index: 5; background: var(--panel);
    border-bottom: 1px solid var(--line); padding: 12px 18px;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 17px; margin: 0; letter-spacing: .5px; }
  header .lib { color: var(--dim); font-size: 12px; }
  .spacer { flex: 1; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  input, select, button {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 10px; font-size: 13px; }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #0b0d12; border-color: var(--accent);
    font-weight: 600; }
  button:disabled { opacity: .5; cursor: default; }
  main { padding: 18px; max-width: 1400px; margin: 0 auto; }
  .grid { display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    overflow: hidden; cursor: pointer; transition: transform .08s, border-color .08s; }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .thumb { width: 100%; aspect-ratio: 63/88; object-fit: cover; background: var(--panel2);
    display: block; }
  .meta { padding: 8px 10px; }
  .meta .id { font-size: 11px; color: var(--dim); }
  .meta .nm { font-weight: 600; font-size: 13px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .badges { display: flex; gap: 4px; margin-top: 6px; align-items: center; }
  .b { width: 18px; height: 18px; border-radius: 5px; font-size: 10px; font-weight: 700;
    display: grid; place-items: center; background: var(--pill); color: var(--dim); }
  .b.on { background: var(--ok); color: #0b0d12; }
  .printed { margin-left: auto; color: var(--ok); font-size: 12px; }
  .queued { margin-left: auto; color: var(--warn); font-size: 11px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim);
    margin: 26px 0 10px; }
  .batches { display: flex; flex-direction: column; gap: 6px; }
  .batch { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 12px; display: flex; gap: 10px; align-items: center; }
  .batch a { color: var(--accent); text-decoration: none; }
  .tag { font-size: 11px; color: var(--dim); }
  #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 16px; max-width: 80vw; white-space: pre-wrap; font-size: 12px;
    display: none; z-index: 20; box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none;
    z-index: 15; padding: 30px; overflow: auto; }
  .modal { max-width: 1100px; margin: 0 auto; background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px; padding: 20px; }
  .modal h3 { margin: 0 0 2px; } .modal .sub { color: var(--dim); margin-bottom: 16px; }
  .stages { display: flex; gap: 14px; flex-wrap: wrap; }
  .stage { text-align: center; } .stage img { max-height: 360px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--panel2); }
  .stage .lbl { margin-top: 6px; color: var(--dim); font-size: 12px; }
  .empty { color: var(--dim); padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>proxdex</h1><span class="lib" id="lib"></span>
  <div class="spacer"></div>
  <div class="controls">
    <button class="primary" id="build" title="upscale → grade for cards that need it">
      ⚙ Build all</button>
    <input id="sname" placeholder="batch name" size="10" value="deck" />
    <select id="faces"><option>fronts</option><option>backs</option>
      <option>duplex</option></select>
    <button id="sheet">🖨 Make sheet</button>
    <button id="refresh" title="Reload">↻</button>
  </div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <h2>Print batches</h2>
  <div class="batches" id="batches"></div>
</main>
<div id="overlay" onclick="if(event.target.id==='overlay')closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div id="toast"></div>
<script>
const $ = s => document.querySelector(s);
let busy = false;
function toast(msg, ms = 4000) {
  const t = $('#toast'); t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._t); if (ms) t._t = setTimeout(() => t.style.display = 'none', ms);
}
async function api(path, opts) {
  const r = await fetch(path, opts); return r.ok ? r.json() : Promise.reject(await r.text());
}
function badge(on, letter) {
  return `<div class="b ${on ? 'on' : ''}">${letter}</div>`;
}
async function loadCards() {
  const cards = await api('/api/cards');
  const g = $('#grid');
  if (!cards.length) { g.innerHTML = '<div class="empty">No cards yet — ' +
    'fetch some with <code>proxdex search</code>.</div>'; }
  else g.innerHTML = cards.map(c => {
    const st = c.stages;
    const pr = c.printed ? '<span class="printed">✓ printed</span>'
      : (c.batch ? '<span class="queued">' + c.batch + '</span>' : '');
    return `<div class="card" onclick="openCard('${c.id}')">
      <img class="thumb" loading="lazy" src="/api/thumb/${c.id}" onerror="this.style.opacity=.15" />
      <div class="meta"><div class="id">${c.id}</div>
      <div class="nm">${c.name}</div>
      <div class="badges">${badge(st.original,'O')}${badge(st.bordered,'B')}
        ${badge(st.upscaled,'U')}${badge(st.edited,'E')}${pr}</div></div></div>`;
  }).join('');
}
async function loadBatches() {
  const b = await api('/api/batches');
  $('#batches').innerHTML = b.length ? b.map(x =>
    `<div class="batch"><b>${x.name}</b>
      <span class="tag">${x.cards} cards · ${x.printed ? 'printed' : 'queued'}</span>
      <div class="spacer"></div>
      ${x.pdfs.map(f => `<a href="/api/pdf/${x.dir}/${f}" target="_blank">${f}</a>`).join(' · ')}
      ${x.printed ? '' : `<button onclick="markPrinted('${x.name}')">mark printed</button>`}
    </div>`).join('') : '<div class="tag">none yet</div>';
}
async function refresh() { await Promise.all([loadCards(), loadBatches()]); }
async function openCard(id) {
  const s = ['original', 'bordered', 'upscaled', 'edited'];
  const c = (await api('/api/cards')).find(x => x.id === id);
  const imgs = s.filter(k => c.stages[k]).map(k =>
    `<div class="stage"><img src="/api/image/${id}/${k}" />
      <div class="lbl">${k}</div></div>`).join('');
  $('#modal').innerHTML = `<h3>${c.name}</h3><div class="sub">${id} · ${c.set}</div>
    <div class="stages">${imgs || '<div class="empty">no images yet</div>'}</div>
    <div style="margin-top:16px"><button class="primary"
      onclick="run('/api/build',{ids:['${id}']},'built ${id}')">⚙ Build this card</button>
      <button onclick="closeModal()">close</button></div>`;
  $('#overlay').style.display = 'block';
}
function closeModal() { $('#overlay').style.display = 'none'; }
async function run(path, body, okmsg) {
  if (busy) return; busy = true; document.querySelectorAll('button').forEach(b => b.disabled = true);
  toast('working…', 0);
  try {
    const r = await api(path, { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {}) });
    toast(r.ok ? (okmsg + '\n' + (r.log || '').trim().split('\n').slice(-4).join('\n'))
      : ('failed:\n' + (r.log || '')), r.ok ? 4000 : 12000);
  } catch (e) { toast('error: ' + e, 12000); }
  busy = false; document.querySelectorAll('button').forEach(b => b.disabled = false);
  closeModal(); refresh();
}
$('#build').onclick = () => run('/api/build', {}, 'build complete');
$('#sheet').onclick = () => run('/api/sheet',
  { name: $('#sname').value || 'deck', faces: $('#faces').value }, 'sheet written');
$('#refresh').onclick = refresh;
async function markPrinted(name) { run('/api/printed/' + encodeURIComponent(name), {}, 'marked printed'); }
api('/api/config').then(c => $('#lib').textContent = c.root);
refresh();
</script>
</body>
</html>
